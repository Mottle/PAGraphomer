# GPS finetuning on ogbg-molfreesolv using a backbone pretrained on ZINC.
out_dir: results
metric_best: mae
metric_agg: argmin
wandb:
  use: False
dataset:
  format: OGB
  name: ogbg-molfreesolv
  task: graph
  task_type: regression
  transductive: False
  molecule_loader: motil_csv
  split_mode: motil_scafford_balance
  split: [0.8, 0.1, 0.1]
  node_encoder: True
  node_encoder_name: Atom+RWSE
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_bn: False
posenc_RWSE:
  enable: True
  kernel:
    times_func: range(1,17)
  model: Linear
  dim_pe: 16
  raw_norm_type: BatchNorm
train:
  mode: gps_finetune
  batch_size: 32
  eval_period: 1
  ckpt_period: 10
  enable_ckpt: True
  ckpt_best: True
  auto_resume: False
model:
  type: GPSModel
  loss_fun: mse_finetune
  edge_decoding: dot
  graph_pooling: mean
gps:
  pretrain:
    enable: False
  finetune:
    enable: True
    freeze_backbone: True
    freeze_backbone_epochs: 10
    backbone_lr_ratio: 0.05
    train_encoder_when_freeze_backbone: True
    encoder_lr_ratio: 1.0
gt:
  layer_type: CustomGatedGCN+Transformer
  layers: 8
  n_heads: 4
  dim_hidden: 64
  dropout: 0.05
  attn_dropout: 0.5
  layer_norm: False
  batch_norm: True
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 64
  batchnorm: True
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
pretrained:
  dir: ""
  weights_path: ""
  reset_prediction_head: True
  load_encoder: True
  freeze_main: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.0001
  max_epoch: 100
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
