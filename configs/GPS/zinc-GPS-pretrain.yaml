# GPS masked self-supervised pretraining on ZINC (PyG-ZINC subset).
# The model reconstructs masked atom types instead of solving the ZINC
# graph regression task during pretraining.
out_dir: results
metric_best: loss
metric_agg: argmin
wandb:
  use: False
dataset:
  format: PyG-ZINC
  name: subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode+RWSE
  node_encoder_num_types: 28
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RWSE:
  enable: True
  kernel:
    times_func: range(1,21)
  model: Linear
  dim_pe: 28
  raw_norm_type: BatchNorm
train:
  mode: gps_pretrain
  batch_size: 32
  eval_period: 1
  ckpt_period: 10
  enable_ckpt: True
  ckpt_best: True
model:
  type: GPSModel
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: add
gps:
  pretrain:
    enable: True
    eval_splits: True
    save_epoch_weights: True
    keep_last_epoch_weights: 3
    mask_ratio: 0.15
    edge_mask_ratio: 0.15
    w_mask_atom: 1.0
    w_mask_edge: 1.0
gt:
  layer_type: GINE+Transformer
  layers: 10
  n_heads: 4
  dim_hidden: 64
  dropout: 0.0
  attn_dropout: 0.5
  layer_norm: False
  batch_norm: True
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 64
  batchnorm: True
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 2000
  scheduler: cosine_with_warmup
  num_warmup_epochs: 50
