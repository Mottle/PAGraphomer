out_dir: results/finetune
metric_best: auc
metric_agg: argmax
wandb:
  use: False
dataset:
  format: OGB
  name: ogbg-moltox21
  task: graph
  task_type: classification
  transductive: False
  split_mode: standard
  node_encoder: True
  node_encoder_name: Atom
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_bn: False
train:
  mode: otformer_finetune
  batch_size: 24
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  auto_resume: False
model:
  type: OTFormerModel
  loss_fun: bce_with_logits_finetune
  graph_pooling: add
otformer:
  layers: 6
  num_heads: 4
  dim_z: 128
  dropout: 0.15
  attn_dropout: 0.2
  layer_norm: True
  ffn_activation: gelu
  recycling_iters: 2
  detach_recycle: True
  rum:
    depth: 1
    num_samples: 12
    rw_length: 8
    dropout: 0.0
    binary: False
    output_softmax: False
  motif:
    memory_size: 64
    sinkhorn_eps: 0.2
    sinkhorn_iters: 30
    log_domain: True
    motif_injection_mode: gate
    path_agg_mode: transport_weighted
  pair:
    use_triangle: True
    triangle_hidden: 32
    use_spd: True
    spd_max_dist: 16
  pretrain:
    enable: False
  finetune:
    enable: True
    freeze_backbone: True
    freeze_backbone_epochs: 20
    backbone_lr_ratio: 0.1
    train_encoder_when_freeze_backbone: True
    encoder_lr_ratio: 1.0
    readout_dim: 256
    cls_hidden: 128
    reg_hidden: 128
    asl_gamma_pos: 1.0
    asl_gamma_neg: 4.0
    asl_clip: 0.05
  ablation:
    enable: False
    disable_rum_ot: False
    readout_variant: full
gt:
  pna_degrees: []
  bigbird:
    attention_type: block_sparse
gnn:
  head: otformer_finetune
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 256
  batchnorm: True
  act: gelu
  dropout: 0.5
  agg: mean
  normalize_adj: False
pretrained:
  dir: results/zinc-OTFormer-pretrain
  weights_path: ""
  reset_prediction_head: True
  load_encoder: True
  freeze_main: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 0.05
  base_lr: 0.0001
  max_epoch: 200
  scheduler: cosine_with_warmup
  num_warmup_epochs: 15
