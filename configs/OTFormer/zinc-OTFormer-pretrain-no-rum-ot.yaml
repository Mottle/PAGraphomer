# OTFormer pretraining config on ZINC without RUM/OT motif front-end.
# This ablation keeps DTBlocks and downstream modules, while disabling
# path extraction + motif memory matching in the forward path.
out_dir: results
metric_best: loss
metric_agg: argmin
wandb:
  use: False
dataset:
  format: PyG-ZINC
  name: subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode
  node_encoder_num_types: 28
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RWSE:
  enable: False
  kernel:
    times_func: range(1, 21)
  model: Linear
  dim_pe: 28
  raw_norm_type: BatchNorm
posenc_RRWP:
  enable: True
  walk_length: 8
  add_identity: True
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  mode: otformer_pretrain
  batch_size: 64
  eval_period: 1
model:
  type: OTFormerModel
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
otformer:
  layers: 6
  num_heads: 4
  dropout: 0.15
  attn_dropout: 0.2
  layer_norm: True
  ffn_activation: gelu
  recycling_iters: 2
  detach_recycle: True
  rum:
    depth: 1
    num_samples: 12
    rw_length: 8
    dropout: 0.0
    binary: False
    output_softmax: False
  motif:
    memory_size: 64
    sinkhorn_eps: 0.5
    sinkhorn_iters: 5
    log_domain: True
  pair:
    use_triangle: True
    triangle_hidden: 32
    use_spd: True
    spd_max_dist: 16
    use_rrwp: True
    rrwp_attr_name: rrwp
    rrwp_dim: 8
  pretrain:
    enable: True
    eval_splits: False
    save_epoch_weights: True
    keep_last_epoch_weights: 3
    mode: no_ot
    atom_mask_ratio: 0.2
    motif_mask_ratio: 0.2
    motif_topk: 4
    edge_perturb_ratio: 0.2
    edge_sample_ratio: 0.1
    edge_neg_ratio: 1.0
    edge_denoise_mode: reconstruct
    hard_neg_max_spd: 3
    w_mask_atom: 0.5
    w_motif_mask: 1.0
    w_edge_denoise: 1.0
    w_ot_prior: 0.5
  ablation:
    enable: True
    disable_rum_ot: True
    readout_variant: full
gt:
  pna_degrees: []
  bigbird:
    attention_type: block_sparse
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 64
  batchnorm: True
  act: gelu
  dropout: 0.1
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: muon_adamw
  weight_decay: 0.05
  base_lr: 0.0005
  muon_momentum: 0.95
  muon_adjust_lr_fn: match_rms_adamw
  max_epoch: 500
  scheduler: cosine_with_warmup
  num_warmup_epochs: 50
