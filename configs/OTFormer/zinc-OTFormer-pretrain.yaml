# OTFormer pretraining config on ZINC (PyG-ZINC subset).
# This config is for stage-3 style joint self-supervised pretraining.
out_dir: results
metric_best: loss
metric_agg: argmin
wandb:
  use: False
dataset:
  # ZINC subset: graph-level regression benchmark.
  format: PyG-ZINC
  name: full
  task: graph
  task_type: regression
  transductive: False
  # Node/edge encoders follow existing GraphGPS conventions.
  node_encoder: True
  node_encoder_name: TypeDictNode
  node_encoder_num_types: 28
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RWSE:
  # Disable node-level RWSE to keep RUM free from PE input.
  enable: False
  kernel:
    times_func: range(1, 21)
  model: Linear
  dim_pe: 28
  raw_norm_type: BatchNorm
posenc_RRWP:
  # Precompute RRWP for GRIT-style pair bias in DTBlocks.
  enable: True
  walk_length: 8
  add_identity: True
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  # Custom pretraining loop registered in gps/train/otformer_pretrain.py
  mode: otformer_pretrain
  batch_size: 48
  eval_period: 1
model:
  # OTFormer network registered in gps/network/otformer_model.py
  type: OTFormerModel
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
otformer:
  # Dual-track OTFormer backbone.
  layers: 6
  num_heads: 4
  dim_z: 128  # Pair track dimension (decoupled from node dim)
  dropout: 0.15
  attn_dropout: 0.2
  layer_norm: True
  ffn_activation: gelu
  # Recycling steps (AlphaFold-style iterative refinement).
  recycling_iters: 2
  # If True, stop gradients through recycled states.
  detach_recycle: True
  rum:
    # RUM path encoder used for local walk features.
    depth: 1
    num_samples: 12
    rw_length: 8
    dropout: 0.0
    binary: False
    output_softmax: False  # Disable softmax for OTFormer path features
  motif:
    # Global motif memory + Sinkhorn OT matching.
    memory_size: 64
    # OT entropy regularization epsilon.
    sinkhorn_eps: 0.2
    # Sinkhorn iterations per forward.
    sinkhorn_iters: 30
    # Use log-domain Sinkhorn for numerical stability.
    log_domain: True
    # How to inject motif/path features into node representation.
    # "add": h0 = h + motif + path; "gate": gated sigmoid modulation
    motif_injection_mode: gate
    # Path feature aggregation: "mean" | "transport_weighted"
    path_agg_mode: transport_weighted
  pair:
    # 2D pair track updates.
    use_triangle: True
    triangle_hidden: 32
    use_spd: True
    spd_max_dist: 16
    use_rrwp: True
    rrwp_attr_name: rrwp
    rrwp_dim: 8
  pretrain:
    # Enable OTFormer joint pretraining losses.
    enable: True
    # For pure SSL pretraining on ZINC, skip val/test loops.
    eval_splits: False
    # Save model weights after each epoch and keep only latest N snapshots.
    save_epoch_weights: True 
    keep_last_epoch_weights: 3
    # Masked atom modeling ratio.
    atom_mask_ratio: 0.2
    # Motif-block masking ratio (component-level blocks).
    motif_mask_ratio: 0.2
    # Top-k frequent motif ids per graph considered for block masking.
    motif_topk: 4
    # Edge corruption ratio for denoising objective.
    edge_perturb_ratio: 0.2
    # Fallback pair sampling ratio when perturb pairs are unavailable.
    edge_sample_ratio: 0.1
    # Number of sampled negative undirected pairs per dropped pair.
    edge_neg_ratio: 1.0
    # Edge denoising mode.
    # Options: random | hard_spd | edge_type | reconstruct
    #   reconstruct: mask edges and reconstruct original edge features (GraphMAE-style)
    edge_denoise_mode: random
    # Max shortest-path distance for hard negative candidates (hard_spd mode only).
    hard_neg_max_spd: 3
    # Fraction of kept true edges sampled as positive examples for edge decoder.
    edge_kept_sample_ratio: 0.1
    # Loss weights for joint objective:
    # L = w_mask_atom*L_mask_atom + w_motif_mask*L_motif_mask
    #   + w_edge_denoise*L_edge_denoise + w_ot_prior*L_ot_prior
    w_mask_atom: 0.5
    w_motif_mask: 1.0
    w_edge_denoise: 1.0
    w_ot_prior: 0.5
    loss_norm:
      mode: fixed
      ema_decay: 0.9
    graph_motif:
      enable: True
      w_graph_to_motif: 1.0
      w_motif_to_props: 0.5
gt:
  pna_degrees: []
  bigbird:
    attention_type: block_sparse
gnn:
  # GraphGPS head / hidden size settings.
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 128
  batchnorm: True
  act: gelu
  dropout: 0.1
  agg: mean
  normalize_adj: False
optim:
  # Optimizer and LR schedule.
  clip_grad_norm: True
  batch_accumulation: 3
  optimizer: muon_adamw
  weight_decay: 0.05
  base_lr: 0.0005
  muon_momentum: 0.95
  muon_adjust_lr_fn: match_rms_adamw
  max_epoch: 50
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5
