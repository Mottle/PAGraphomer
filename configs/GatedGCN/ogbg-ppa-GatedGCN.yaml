out_dir: results
metric_best: accuracy
wandb:
  use: False
dataset:
  format: OGB
  name: ogbg-ppa
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: PPANode
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: PPAEdge
  edge_encoder_bn: False
train:
  mode: custom
  batch_size: 64
  eval_period: 1
  ckpt_period: 100
model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean
gnn:
  head: default
  layers_pre_mp: 0
  layers_mp: 3
  layers_post_mp: 2
  dim_inner: 256
  layer_type: gatedgcnconv
  act: relu
  residual: True
  dropout: 0.1
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.0003
  max_epoch: 200
  scheduler: cosine_with_warmup
  num_warmup_epochs: 10
