out_dir: results
metric_best: accuracy
metric_agg: argmax
tensorboard_each_run: True
accelerator: cuda:0
wandb:
  use: False
dataset:
  format: PyG-ZINC
  name: full
  task: graph
  task_type: classification
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode
  node_encoder_num_types: 21
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RRWP:
  enable: True
  ksteps: 11
  walk_length: 11
  add_identity: True
  add_node_attr: False
  add_inverse: False
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_best: False
  ckpt_clean: True
  ckpt_period: 1
model:
  type: SRFxRUM_MANI_Model
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: add
gt:
  layer_type: ScaledRangeFormerMixed
  layers: 4
  n_heads: 4
  dim_hidden: 256
  dropout: 0.3
  layer_norm: False
  batch_norm: True
  update_e: True
  attn_dropout: 0.1
  attn:
    clamp: 5.0
    act: relu
    full_attn: True
    O_e: True
    norm_e: True
  msrrwp:
    rrwp_name: rrwp
    use_spd: True
    spd_name: srf_spd
    spd_max_dist: 16
    thresholds: [0.3, 0.6, 1.0]
    scale_mode: percentile
    mask_mode: hard
    weight_in_softmax: False
    learnable_weights: True
    inner_residual: True
    inner_norm: True
    inject_edge_attr: True
    add_adj_indicator: True
srf_rum_mani:
  layers: 4
  dim_hidden: 256
  num_prototypes: 4
  motif_temperature: 1.0
  alpha: 1.0
  dropout: 0.3
  pretrain:
    enable: True
    mask_ratio: 0.15
    motif_contrastive:
      enable: True
      weight: 0.5
      temperature: 0.5
    view_dropout:
      enable: True
      weight: 0.3
      ratio: 0.3
    atom_context:
      enable: True
      weight: 1.0
      dim: 158
    mol_property:
      enable: True
      weight: 0.5
      num_props: 21
    fingerprint_contrastive:
      enable: True
      weight: 1.0
      margin: 0.8
      adaptive_coeff: 1.0
      temperature: 0.1
    scaffold_contrastive:
      enable: True
      weight: 1.0
      margin: 0.8
      adaptive_coeff: 1.0
      temperature: 0.1
    perturbation_contrastive:
      enable: True
      weight: 1.0
      crem_db: datasets/chembl22_sa2.db
      max_size: 5
      radius: 2
  srf:
    formulation: "B"
    attn_dropout: 0.1
  rum:
    num_samples: 6
    length: 8
    depth: 1
    dropout: 0.3
    self_supervise: False
    binary: False
    use_edge_features: False
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 256
  batchnorm: True
  act: relu
  dropout: 0.3
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: muon_adamw
  weight_decay: 1e-5
  base_lr: 0.002
  max_epoch: 200
  num_warmup_epochs: 25
  scheduler: cosine_with_warmup
  min_lr: 1e-6
  muon_momentum: 0.95
  muon_adjust_lr_fn: match_rms_adamw
