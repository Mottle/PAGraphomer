out_dir: results
metric_best: accuracy-SBM
metric_agg: argmax
wandb:
  use: False
dataset:
  format: PyG-TUDataset
  name: PROTEINS
  task: graph
  task_type: classification
  transductive: False
  split_mode: cv-stratifiedkfold-10
  split_dir: splits
  split: [0.8, 0.1, 0.1]
  node_encoder: True
  node_encoder_name: LinearNode
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: DummyEdge
  edge_encoder_bn: False
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  ckpt_clean: True
model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_mp: 4
  layers_post_mp: 2
  dim_inner: 48
  layer_type: gineconv
  act: relu
  residual: True
  dropout: 0.3
optim:
  clip_grad_norm: True
  clip_grad_norm_value: 5.0
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 100
  scheduler: cosine_with_warmup
  num_warmup_epochs: 10
