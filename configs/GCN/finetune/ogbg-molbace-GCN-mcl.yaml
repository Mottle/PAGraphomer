out_dir: results/finetune
metric_best: auc
metric_agg: argmax
seed: 0
wandb:
  use: False
dataset:
  format: OGB
  name: ogbg-molbace
  task: graph
  task_type: classification
  transductive: False
  split_mode: molmcl_scaffold
  split: [0.8, 0.1, 0.1]
  node_encoder: True
  node_encoder_name: Atom
  node_encoder_bn: False
  edge_encoder: False
  edge_encoder_bn: False
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  auto_resume: False
model:
  type: custom_gnn
  loss_fun: bce_with_logits_finetune
  graph_pooling: add
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_mp: 5
  layers_post_mp: 2
  dim_inner: 128
  layer_type: gcnconv
  act: relu
  residual: True
  dropout: 0.3
optim:
  clip_grad_norm: True
  clip_grad_norm_value: 5.0
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 100
  scheduler: cosine_with_warmup
  num_warmup_epochs: 10
