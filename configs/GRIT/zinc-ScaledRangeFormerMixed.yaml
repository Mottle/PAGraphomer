out_dir: results
metric_best: mae
metric_agg: argmin
tensorboard_each_run: True
accelerator: cuda:0
wandb:
  use: False
dataset:
  format: PyG-ZINC
  name: subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode
  node_encoder_num_types: 21
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RRWP:
  enable: True
  ksteps: 11
  walk_length: 11
  add_identity: True
  add_node_attr: False
  add_inverse: False
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  mode: custom
  batch_size: 32
  eval_period: 1
model:
  type: GritTransformer
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
gt:
  layer_type: ScaledRangeFormerMixed
  layers: 6
  n_heads: 4
  dim_hidden: 32
  dropout: 0.0
  layer_norm: False
  batch_norm: True
  update_e: True
  attn_dropout: 0.1
  attn:
    clamp: 5.0
    act: relu
    full_attn: True
    O_e: True
    norm_e: True
  msrrwp:
    rrwp_name: rrwp
    use_spd: True
    spd_name: srf_spd
    spd_max_dist: 16
    thresholds: [0.3, 0.6, 1.0]
    normalizers: [softmax, entmax15, sparsemax]
    scale_mode: percentile
    mask_mode: hard
    weight_in_softmax: False
    learnable_weights: True
    inner_residual: True
    inner_norm: True
    inject_edge_attr: True
    add_adj_indicator: True
# This config uses the GRIT network shell, but the RRWP multiscale layer reads
# `pair_index/pair_attr` prepared by a dedicated RRWP pair encoder. The pair
# state is initialized from RRWP relative features, then optionally enriched
# with projected real-edge features and an explicit adjacency indicator. The
# multi-scale masks themselves are now defined from percentile thresholds over
# precomputed shortest-path distances, matching the original distance-mask idea.
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 32
  batchnorm: True
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 2000
  num_warmup_epochs: 50
  scheduler: cosine_with_warmup
  min_lr: 1e-6
