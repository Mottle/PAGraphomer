out_dir: results
metric_best: loss
metric_agg: argmin
wandb:
  use: False
dataset:
  format: PyG-ZINC
  name: subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode
  node_encoder_num_types: 21
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RRWP:
  enable: True
  ksteps: 11
  walk_length: 11
  add_identity: True
  add_node_attr: False
  add_inverse: False
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  mode: grit_pretrain
  batch_size: 32
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  ckpt_clean: True
model:
  type: GritTransformer
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
grit:
  pretrain:
    enable: True
    eval_splits: False
    save_epoch_weights: True
    keep_last_epoch_weights: 3
    mask_ratio: 0.15
    edge_mask_ratio: 0.15
    w_mask_atom: 1.0
    w_mask_edge: 1.0
gt:
  layer_type: GritTransformer
  layers: 8
  n_heads: 4
  dim_hidden: 32
  dropout: 0.0
  layer_norm: False
  batch_norm: True
  update_e: True
  attn_dropout: 0.2
  attn:
    clamp: 5.0
    act: gelu
    full_attn: True
    edge_enhance: True
    O_e: True
    norm_e: True
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 32
  batchnorm: True
  act: gelu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: muon_adamw
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 500
  num_warmup_epochs: 50
  scheduler: cosine_with_warmup
  min_lr: 1e-6
