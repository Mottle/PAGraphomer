out_dir: results
metric_best: loss
metric_agg: argmin
wandb:
  use: False
dataset:
  format: OGB
  name: ogbg-molzinc15_250K
  task: graph
  task_type: regression
  transductive: False
  molecule_loader: motil_csv
  external_smiles_csv: datasets/motil_micromolecule/zinc15_250K.csv
  split_mode: random
  split: [1.0, 0.0, 0.0]
  node_encoder: True
  node_encoder_name: Atom
  node_encoder_num_types: 28
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_RRWP:
  enable: True
  ksteps: 11
  walk_length: 11
  add_identity: True
  add_node_attr: False
  add_inverse: False
  spd: False
  attr_name_abs: rrwp
  attr_name_rel: rrwp
train:
  mode: grit_motil_pretrain
  batch_size: 256
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  ckpt_clean: True
  auto_resume: True
model:
  type: GritTransformer
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
grit:
  pretrain:
    enable: False
  motil_pretrain:
    enable: True
    eval_splits: False
    save_epoch_weights: True
    keep_last_epoch_weights: 3
    dropout1: 0.3
    dropout2: 0.3
    depth1: 8
    depth2: 4
    temperature: 0.1
    diffusion_steps: 1000
    diffusion_hidden: 32
    diffusion_lr: 3e-5
    contrast_lr: 3e-5
    scheduler_gamma: 0.99
    scheduler_step: 500
    w_diffusion: 1.0
    w_contrast: 1.0
    w_fgs: 1.0
    task_cycle: alternate
gt:
  layer_type: GritTransformer
  layers: 8
  n_heads: 4
  dim_hidden: 32
  dropout: 0.0
  layer_norm: False
  batch_norm: True
  update_e: True
  attn_dropout: 0.2
  attn:
    clamp: 5.0
    act: gelu
    full_attn: True
    edge_enhance: True
    O_e: True
    norm_e: True
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 32
  batchnorm: True
  act: gelu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  batch_accumulation: 1
  clip_grad_norm: True
  optimizer: muon_adamw
  weight_decay: 1e-5
  base_lr: 3e-5
  max_epoch: 100
  num_warmup_epochs: 1
  scheduler: cosine_with_warmup
  min_lr: 1e-6
