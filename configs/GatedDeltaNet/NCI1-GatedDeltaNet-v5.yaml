out_dir: results
metric_best: accuracy-SBM
metric_agg: argmax
wandb:
  use: False
dataset:
  format: PyG-TUDataset
  name: NCI1
  task: graph
  task_type: classification
  transductive: False
  split_mode: cv-stratifiedkfold-5
  split_dir: splits
  split: [0.8, 0.1, 0.1]
  node_encoder: True
  node_encoder_name: LinearNode
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: DummyEdge
  edge_encoder_bn: False
run_multiple_splits: [0,1,2,3,4]
posenc_RWSE:
  enable: True
  kernel:
    times_func: range(1,17)
  model: none
  dim_pe: 16
  raw_norm_type: BatchNorm
posenc_LapPE:
  enable: True
  eigen:
    laplacian_norm: sym
    eigvec_norm: L2
    max_freqs: 12
  model: none
  dim_pe: 12
  raw_norm_type: none
train:
  mode: custom
  batch_size: 128
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  ckpt_clean: True
model:
  type: GatedDeltaNetModel
  loss_fun: cross_entropy
  graph_pooling: add
gt:
  layer_type: GatedDeltaNet
  layers: 4
  n_heads: 4
  dim_hidden: 32
  dropout: 0.2
  layer_norm: False
  batch_norm: False
  perm_ensemble: 4
  perm_lambda: 0.3
  perm_mode: swap
  perm_pct: 20
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 2
  dim_inner: 32
  batchnorm: False
  act: relu
  dropout: 0.1
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  clip_grad_norm_value: 5.0
  optimizer: adamW
  weight_decay: 1e-4
  base_lr: 0.001
  max_epoch: 150
  scheduler: cosine_with_warmup
  num_warmup_epochs: 10
