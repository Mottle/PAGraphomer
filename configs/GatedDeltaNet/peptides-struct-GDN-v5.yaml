out_dir: results
metric_best: mae
metric_agg: argmin
wandb:
  use: True
  project: peptides-struct
dataset:
  format: OGB
  name: peptides-structural
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: Atom+RWSE
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Bond
  edge_encoder_bn: False
posenc_RWSE:
  enable: True
  kernel:
    times_func: range(1,17)
  model: Linear
  dim_pe: 16
  raw_norm_type: BatchNorm
train:
  mode: custom
  batch_size: 128
  eval_period: 1
  ckpt_period: 100
model:
  type: GatedDeltaNetModel
  loss_fun: l1
  graph_pooling: mean
gt:
  layer_type: GatedDeltaNet
  layers: 4
  n_heads: 4
  dim_hidden: 96
  dropout: 0.0
  layer_norm: False
  batch_norm: True
  dual_fla: True
  perm_ensemble: 4
  perm_lambda: 0.3
  perm_pct: 20
  gdn_head_dim: 16
  gdn_expand_v: 2
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 2
  dim_inner: 96
  batchnorm: False
  act: relu
  dropout: 0.0
  agg: mean
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 0.0
  base_lr: 0.0003
  max_epoch: 200
  scheduler: cosine_with_warmup
  num_warmup_epochs: 10
